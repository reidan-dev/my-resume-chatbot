<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" sizes="32x32" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Folio — Dan Pablo's AI Resume Chatbot</title>

    <!-- Primary meta -->
    <meta name="description" content="Full-stack developer in Python, React, and AI. Chat with Folio — an AI assistant grounded in Dan's resume — to learn about his experience." />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://danpablo.dev" />
    <meta property="og:title"       content="Dan Pablo — Software Developer &amp; AI Practitioner" />
    <meta property="og:description" content="Full-stack developer in Python, React, and AI. Chat with Folio — an AI assistant grounded in Dan's resume — to learn about his experience." />
    <meta property="og:image"       content="https://danpablo.dev/og-image.png" />

    <!-- Twitter / X -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Dan Pablo — Software Developer &amp; AI Practitioner" />
    <meta name="twitter:description" content="Full-stack developer in Python, React, and AI. Chat with Folio — an AI assistant grounded in Dan's resume — to learn about his experience." />
    <meta name="twitter:image"       content="https://danpablo.dev/og-image.png" />

    <!-- Devicon -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css" />

    <script>
      (function () {
        var t = localStorage.getItem('theme')
        if (t === 'dark') {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
